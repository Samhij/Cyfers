services:
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm dev --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - BACKEND_URL=http://backend:5000
      - NEXT_PUBLIC_BACKEND_URL=http://backend:5000
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build: ./backend
    working_dir: /app
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    environment:
      - FLASK_ENV=development
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health').read()"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: somtoday
      POSTGRES_PASSWORD: somtoday
      POSTGRES_DB: somtoday
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U somtoday -d somtoday"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

volumes:
  postgres_data: