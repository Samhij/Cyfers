services:
  # 1. Next.js Frontend (The Gatekeeper)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:3000" # Your PC port 80 -> Next.js port 3000
    environment:
      - NODE_ENV=production
      # This is used by the Next.js SERVER, so it uses the Docker service name
      - BACKEND_URL=http://backend:5000
    restart: always
    depends_on:
      - backend

  # 2. Flask Backend (Private)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    # NO PORTS EXPOSED HERE. Flask is now hidden from your PC.
    shm_size: '2gb'
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    depends_on:
      - db
    restart: always

  # 3. Postgres Database (Private)
  db:
    image: postgres:16-alpine
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data: