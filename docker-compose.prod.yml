services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_BACKEND_URL: http://backend:5000
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    working_dir: /app
    command: gunicorn --bind 0.0.0.0:5000 main:app
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      PYTHONUNBUFFERED: "1"
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: somtoday
      POSTGRES_PASSWORD: somtoday
      POSTGRES_DB: somtoday
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: